<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#2E2417">
<title>Stonecutter</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:system-ui,'Segoe UI',Roboto,sans-serif;background:#EADFC8;color:#33291A;touch-action:manipulation;-webkit-user-select:none;user-select:none}
#app{max-width:480px;margin:0 auto;min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;padding:16px}
.screen{flex:1;display:flex;flex-direction:column}
.hidden{display:none!important}
h1{font-size:42px;letter-spacing:1px}
.tag{color:#7A6B4F;font-size:17px;margin-top:4px}
.logo{display:flex;flex-direction:column;gap:7px;margin:40px 0 14px;width:60%}
.logo span{height:11px;border-radius:3px;background:#C9B583}
.logo span:nth-child(1){width:12.5%}
.logo span:nth-child(2){width:25%}
.logo span:nth-child(3){width:50%}
.logo span:nth-child(4){width:100%;background:#B98A2F}
.stats{display:flex;gap:8px;margin:24px 0 8px}
.stat{flex:1;background:#F6EEDC;border-radius:12px;padding:10px;text-align:center}
.stat .v{font-size:20px;font-weight:700}
.stat .l{font-size:12px;color:#7A6B4F}
.btn{display:block;width:100%;padding:16px;border:none;border-radius:14px;font-size:18px;font-weight:600;background:#33291A;color:#F6EEDC;margin-top:12px;cursor:pointer;font-family:inherit}
.btn:active{transform:scale(.98)}
.btn.ghost{background:transparent;color:#33291A;border:2px solid #C9B583}
.btn.small{padding:10px;font-size:15px}
.topbar{display:flex;justify-content:space-between;align-items:center;font-size:14px;color:#7A6B4F;margin-bottom:12px;gap:8px}
.topbar b{color:#33291A}
#btn-back{background:none;border:none;font-size:26px;color:#7A6B4F;cursor:pointer;line-height:1;padding:0 6px}
.order{background:#F6EEDC;border:2px solid #D8C79F;border-radius:16px;padding:12px 16px;margin-bottom:12px;text-align:center}
.order .big{font-size:30px;font-weight:700}
.order .sub{font-size:14px;color:#7A6B4F;margin-top:2px}
#stones{margin-bottom:4px}
.stone{display:flex;justify-content:space-between;align-items:center;background:#F1E6C8;border:2px solid #C9B583;border-radius:12px;padding:13px 16px;font-size:18px;margin-bottom:8px;cursor:pointer;animation:pop .2s}
.stone.sel{background:#D9EDE6;border-color:#177E74;color:#0F5A52}
.stone .p{font-weight:700}
@keyframes pop{from{transform:scale(.9);opacity:0}}
@keyframes shake{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:shake .18s 2}
.qcard{background:#F6EEDC;border-radius:14px;padding:14px;margin-bottom:12px;position:relative}
.qclose{position:absolute;top:6px;right:6px;background:none;border:none;font-size:16px;color:#7A6B4F;cursor:pointer;padding:6px;line-height:1}
.qcard .prompt{font-size:15px;color:#7A6B4F;text-align:center}
.qcard .eq{font-size:26px;font-weight:700;text-align:center;margin:6px 0 10px}
.choices{display:flex;gap:8px}
.choices button{flex:1;padding:14px;font-size:20px;font-weight:700;border-radius:12px;border:2px solid #C9B583;background:#FBF6E7;cursor:pointer;font-family:inherit}
.choices button:active{transform:scale(.96)}
.entry{font-size:28px;font-weight:700;text-align:center;min-height:36px;letter-spacing:2px}
.kp{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.kp button{padding:12px;font-size:20px;font-weight:600;border-radius:10px;border:2px solid #C9B583;background:#FBF6E7;cursor:pointer;font-family:inherit}
.kp button:active{transform:scale(.96)}
.qmsg{font-size:14px;color:#A93B2A;text-align:center;margin-top:8px;min-height:18px}
.note{font-size:14px;color:#7A6B4F;text-align:center;margin-bottom:10px}
.tracker{text-align:center;font-size:17px;font-weight:600;padding:12px;border-radius:12px;background:#F6EEDC;margin-top:auto}
.tracker.ok{background:#D9EDE6;color:#0F5A52}
.tracker.over{background:#F3D9D2;color:#A93B2A}
#overlay{position:fixed;inset:0;background:rgba(40,30,15,.55);display:flex;align-items:center;justify-content:center;padding:24px;z-index:10}
.ovl{background:#F6EEDC;border-radius:20px;padding:24px;text-align:center;width:100%;max-width:380px}
.ovl h2{font-size:24px;margin-bottom:8px}
.ovl .eq1{font-size:17px;color:#7A6B4F}
.ovl .eq2{font-size:28px;font-weight:700;margin:6px 0}
.ovl .sub{font-size:14px;color:#7A6B4F}
.ovl .coins{font-size:19px;font-weight:700;color:#B98A2F;margin-top:10px}
.ovl .rankup{background:#EFE3C2;border-radius:12px;padding:10px;margin-top:12px;font-size:15px}
.ovl ol{text-align:left;margin:10px 0 0 20px;font-size:15px;line-height:1.6}
.mrow{display:flex;gap:2px;justify-content:center}
.mcell{border-radius:2px;box-sizing:border-box}
.mcell.on{background:#D8B56A;border:1px solid #B98A2F}
.mcell.off{border:1px dashed #C9B583;opacity:.45}
.gold .mcell.on{background:#F2C94C;border-color:#B8860B}
.mcell.newb{animation:bpop .3s both}
@keyframes bpop{from{transform:scale(0)}60%{transform:scale(1.35)}to{transform:scale(1)}}
.mon-banner{background:#EFE3C2;border-radius:12px;padding:12px;text-align:center;font-weight:600;margin-bottom:10px;font-size:16px}
.mus{background:#F6EEDC;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.mus .t{font-weight:700;font-size:16px}
.mus .w{font-size:13px;color:#7A6B4F;margin-top:4px;line-height:1.45}
.mus.cur{border:2px solid #B98A2F}
.mus.lock{opacity:.55}
.mus .bar{height:8px;background:#EADFC8;border-radius:4px;margin-top:8px;overflow:hidden}
.mus .bar i{display:block;height:100%;background:#B98A2F;border-radius:4px}
.setrow{display:flex;justify-content:space-between;align-items:center;background:#F6EEDC;border-radius:12px;padding:14px 16px;margin-bottom:10px;font-size:16px}
.tgl{border:2px solid #C9B583;background:#FBF6E7;border-radius:20px;padding:6px 18px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;color:#7A6B4F}
.tgl.on{background:#177E74;border-color:#177E74;color:#F6EEDC}
input[type=range]{flex:1;margin-left:16px;accent-color:#177E74}
</style>
</head>
<body>
<div id="app">

<div id="scr-home" class="screen">
  <div class="logo"><span></span><span></span><span></span><span></span></div>
  <h1>Stonecutter</h1>
  <p class="tag">Multiply anything with the scribe's ancient secret.</p>
  <div class="stats">
    <div class="stat"><div class="v" id="h-day">Day 1</div><div class="l">progress</div></div>
    <div class="stat"><div class="v" id="h-coins">0</div><div class="l">coins</div></div>
    <div class="stat"><div class="v" id="h-rank">Apprentice</div><div class="l">rank</div></div>
  </div>
  <button class="btn" id="btn-play">Play</button>
  <button class="btn ghost" id="btn-mon">&#129521; Monument</button>
  <button class="btn ghost" id="btn-museum">&#127963;&#65039; Museum</button>
  <button class="btn ghost" id="btn-how">How to play</button>
  <button class="btn ghost" id="btn-set">&#9881; Settings</button>
</div>

<div id="scr-set" class="screen hidden">
  <div class="topbar">
    <button id="btn-set-back">&#8249;</button>
    <span><b>Settings</b></span>
    <span></span>
  </div>
  <div class="setrow"><span>Background sound</span><button class="tgl" id="tgl-music"></button></div>
  <div class="setrow"><span>Volume</span><input type="range" id="vol" min="0" max="100" step="5"></div>
  <div class="setrow"><span>Button sounds</span><button class="tgl" id="tgl-sfx"></button></div>
  <button class="btn ghost small" id="btn-reset">Erase progress</button>
  <button class="btn" id="btn-exit" style="margin-top:auto">Exit game</button>
</div>

<div id="scr-game" class="screen hidden">
  <div class="topbar">
    <button id="btn-back">&#8249;</button>
    <span><b id="day"></b> &middot; <span id="rank"></span></span>
    <span id="timer" style="font-weight:700;color:#B98A2F"></span>
    <span>cracks <b id="cracks"></b></span>
    <span>&#129689; <b id="coins"></b></span>
  </div>
  <div class="order">
    <div class="big" id="order-big"></div>
    <div class="sub" id="order-sub"></div>
  </div>
  <div id="stones"></div>
  <div id="qwrap"></div>
  <p class="note" id="note"></p>
  <div class="tracker" id="tracker"></div>
</div>

<div id="scr-mon" class="screen hidden">
  <div class="topbar">
    <button id="btn-mon-back">&#8249;</button>
    <span><b id="mon-name"></b></span>
    <span id="mon-count"></span>
  </div>
  <div id="mon-banner" class="hidden"></div>
  <div id="mon-grid" style="margin:auto 0;display:flex;flex-direction:column;gap:2px"></div>
  <button class="btn" id="btn-mon-go">Back</button>
</div>

<div id="scr-museum" class="screen hidden">
  <div class="topbar">
    <button id="btn-mus-back">&#8249;</button>
    <span><b>Monument Museum</b></span>
    <span id="mus-count"></span>
  </div>
  <div id="mus-list"></div>
</div>

</div>
<div id="overlay" class="hidden"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const $=id=>document.getElementById(id);
const LS='stonecutter-v1';
let S=Object.assign({round:1,coins:0,sfx:true,music:true,musicVol:0.4,mon:0,monBlocks:0,gild:0},JSON.parse(localStorage.getItem(LS)||'{}'));
if('sound' in S){S.sfx=S.sound;S.music=S.sound;delete S.sound;}
function save(){localStorage.setItem(LS,JSON.stringify(S));}
function rand(a,b){return a+Math.floor(Math.random()*(b-a+1));}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

const GOODS=[["fish","\u{1F41F}","baskets"],["loaves","\u{1F35E}","sacks"],["jars","\u{1F3FA}","crates"],["bricks","\u{1F9F1}","carts"],["goats","\u{1F410}","pens"],["melons","\u{1F348}","boats"]];
const NAMES=["Nefer","Khay","Amara","Tia","Ramose","Iset","Hori","Meri","Seti","Nub"];
const RANKS=["","Apprentice","Carver","Scribe","Master"];
function tierFor(r){return r<=4?1:r<=10?2:r<=18?3:4;}

const bg=new Audio('background.mp3');bg.loop=true;
function applyMusic(){bg.volume=S.musicVol;if(S.music)bg.play().catch(()=>{});else bg.pause();}
document.addEventListener('pointerdown',function f(){document.removeEventListener('pointerdown',f);applyMusic();});
let AC=null;
function tone(f,dur,type,vol,delay){if(!S.sfx)return;try{AC=AC||new (window.AudioContext||window.webkitAudioContext)();const t=AC.currentTime+(delay||0);const o=AC.createOscillator(),g=AC.createGain();o.type=type||'sine';o.frequency.value=f;g.gain.setValueAtTime(vol||0.12,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);o.connect(g);g.connect(AC.destination);o.start(t);o.stop(t+dur);}catch(e){}}
const snd={
 tap:()=>tone(600,0.06,'square',0.05),
 sel:n=>tone(300+n*40,0.1,'sine',0.1),
 carve:()=>{tone(440,0.1);tone(660,0.12,'sine',0.1,0.08);},
 err:()=>tone(120,0.25,'sawtooth',0.12),
 win:()=>{[523,659,784,1047].forEach((f,i)=>tone(f,0.18,'sine',0.12,i*0.12));},
 rank:()=>{[392,523,659,784,1047].forEach((f,i)=>tone(f,0.25,'triangle',0.12,i*0.15));}
};

function vbox(a,x0,x1,z0,z1,y0,y1){for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++)for(let z=z0;z<=z1;z++)a.push([x,y,z]);}
function buildVoxels(){
 const pyr=[];let h=0;
 [9,7,5,3,1].forEach(s=>{const o=(9-s)/2;const layer=[];
  for(let x=0;x<s;x++)for(let z=0;z<s;z++)if(s===1||x===0||z===0||x===s-1||z===s-1)layer.push([o+x,h,o+z]);
  layer.sort((a,b)=>(a[2]-b[2])||(a[0]-b[0]));pyr.push(...layer);h++;});
 let sx=[];
 vbox(sx,2,9,0,3,0,1);vbox(sx,7,9,0,3,2,2);vbox(sx,2,3,0,3,2,2);
 vbox(sx,2,3,1,2,3,5);vbox(sx,2,3,0,0,3,4);vbox(sx,2,3,3,3,3,4);
 vbox(sx,0,1,0,0,0,0);vbox(sx,0,1,3,3,0,0);
 const seen=new Set();sx=sx.filter(v=>{const k=v.join(',');if(seen.has(k))return false;seen.add(k);return true;});
 sx.sort((a,b)=>(a[1]-b[1])||(b[0]-a[0])||(a[2]-b[2]));
 const ob=[];vbox(ob,0,3,0,3,0,0);vbox(ob,1,2,1,2,1,9);
 ob.sort((a,b)=>(a[1]-b[1])||(a[2]-b[2])||(a[0]-b[0]));
 function ringCells(r0,r1){
  const c=[],R=Math.ceil(r1);
  for(let x=-R;x<=R;x++)for(let z=-R;z<=R;z++){const d=Math.hypot(x,z);if(d>=r0&&d<=r1)c.push([x,z]);}
  c.sort((a,b)=>Math.atan2(a[1],a[0])-Math.atan2(b[1],b[0]));
  return c;
 }
 const sh=[];
 ringCells(4.1,5.05).forEach((c,i)=>{if(i%2===0){sh.push([c[0],0,c[1]],[c[0],1,c[1]]);}sh.push([c[0],2,c[1]]);});
 ringCells(6.6,7.45).forEach((c,i)=>{if(i%2===0)sh.push([c[0],0,c[1]]);});
 const tri=(x,z,dx,dz)=>{vbox(sh,x,x,z,z,0,2);vbox(sh,x+2*dx,x+2*dx,z+2*dz,z+2*dz,0,2);sh.push([x,3,z],[x+dx,3,z+dz],[x+2*dx,3,z+2*dz]);};
 tri(-2,-1,0,1);tri(2,-1,0,1);tri(-1,-2,1,0);
 sh.push([0,0,0]);
 const pa=[];
 vbox(pa,0,6,0,4,0,0);
 [0,2,4,6].forEach(x=>{vbox(pa,x,x,0,0,1,3);vbox(pa,x,x,4,4,1,3);});
 vbox(pa,0,0,2,2,1,3);vbox(pa,6,6,2,2,1,3);
 vbox(pa,0,6,0,0,4,4);vbox(pa,0,6,4,4,4,4);vbox(pa,0,0,1,3,4,4);vbox(pa,6,6,1,3,4,4);
 vbox(pa,0,6,1,3,5,5);vbox(pa,0,6,2,2,6,6);
 const lh=[];
 vbox(lh,0,4,0,4,0,0);
 vbox(lh,0,4,0,0,1,3);vbox(lh,0,4,4,4,1,3);vbox(lh,0,0,1,3,1,3);vbox(lh,4,4,1,3,1,3);
 vbox(lh,1,3,1,3,4,6);
 vbox(lh,2,2,2,2,7,8);
 lh.push([2,9,2]);
 const aq=[];
 [0,3,6,9,12].forEach(x=>vbox(aq,x,x,0,1,0,2));
 for(let x=0;x<=12;x++)if(x%3!==0)vbox(aq,x,x,0,1,2,2);
 vbox(aq,0,12,0,1,3,3);
 [0,2,4,6,8,10,12].forEach(x=>vbox(aq,x,x,0,1,4,4));
 vbox(aq,0,12,0,1,5,5);
 const co=[];
 ringCells(4.1,5.05).forEach((c,i)=>{
  if(c[1]<0){for(let y=0;y<=4;y++){if(y===1&&i%2===1)continue;if(y===3&&i%2===0)continue;co.push([c[0],y,c[1]]);}}
  else{co.push([c[0],0,c[1]],[c[0],1,c[1]]);}
 });
 for(let x=-2;x<=2;x++)for(let z=-2;z<=2;z++)if(Math.hypot(x,z)<=2.5)co.push([x,0,z]);
 const per=(a,x0,x1,z0,z1,y)=>{vbox(a,x0,x1,z0,z0,y,y);vbox(a,x0,x1,z1,z1,y,y);vbox(a,x0,x0,z0+1,z1-1,y,y);vbox(a,x1,x1,z0+1,z1-1,y,y);};
 const gw=[];
 vbox(gw,0,1,0,2,0,4);vbox(gw,11,12,0,2,0,4);
 vbox(gw,2,10,0,1,0,1);
 [3,5,7,9].forEach(x=>{gw.push([x,2,0],[x,2,1]);});
 [[0,0],[0,2],[1,0],[1,2],[11,0],[11,2],[12,0],[12,2]].forEach(c=>gw.push([c[0],5,c[1]]));
 const pg=[];
 vbox(pg,1,3,1,3,0,1);vbox(pg,0,4,0,4,2,2);
 vbox(pg,1,3,1,3,3,4);vbox(pg,0,4,0,4,5,5);
 vbox(pg,1,3,1,3,6,7);vbox(pg,0,4,0,4,8,8);
 vbox(pg,2,2,2,2,9,10);
 const aw=[];
 vbox(aw,0,8,0,8,0,0);
 [[1,1],[1,7],[7,1],[7,7]].forEach(c=>vbox(aw,c[0],c[0],c[1],c[1],1,3));
 vbox(aw,3,5,3,5,1,3);vbox(aw,4,4,4,4,4,5);
 const ci=[];
 for(let t=0;t<4;t++){per(ci,t,8-t,t,8-t,t);vbox(ci,3,5,t-1,t-1,t,t);}
 per(ci,3,5,3,5,4);vbox(ci,3,5,3,5,5,5);
 const tm=[];
 per(tm,0,10,0,6,0);per(tm,1,9,1,5,1);per(tm,2,8,2,4,2);
 vbox(tm,2,8,2,4,3,3);
 vbox(tm,2,3,2,3,4,5);vbox(tm,7,8,2,3,4,5);
 vbox(tm,3,4,-1,-1,0,0);vbox(tm,6,7,-1,-1,0,0);
 vbox(tm,3,4,0,0,1,1);vbox(tm,6,7,0,0,1,1);
 vbox(tm,3,4,1,1,2,2);vbox(tm,6,7,1,1,2,2);
 const zg=[];
 per(zg,0,8,0,5,0);vbox(zg,0,8,0,5,1,1);
 per(zg,2,6,1,4,2);vbox(zg,2,6,1,4,3,3);
 vbox(zg,3,5,2,3,4,5);
 vbox(zg,3,5,-2,-1,0,0);vbox(zg,3,5,-1,-1,1,1);vbox(zg,3,5,0,0,2,2);vbox(zg,3,5,1,1,3,3);
 const tj=[];
 vbox(tj,0,6,0,6,0,0);
 per(tj,1,5,1,5,1);per(tj,1,5,1,5,2);
 vbox(tj,1,5,1,5,3,3);
 vbox(tj,2,4,2,4,4,4);tj.push([3,5,3]);
 [[0,0],[0,6],[6,0],[6,6]].forEach(c=>vbox(tj,c[0],c[0],c[1],c[1],1,4));
 const mo=[];
 vbox(mo,0,11,0,1,0,0);
 [1,5,9].forEach(x=>{
  vbox(mo,x,x+1,0,1,1,4);
  vbox(mo,x,x+1,-1,-1,4,4);
  vbox(mo,x,x+1,-1,-1,2,3);
 });
 const mp=[];
 per(mp,0,9,0,6,0);per(mp,1,8,1,5,1);per(mp,2,7,2,4,2);
 vbox(mp,2,7,2,4,3,3);
 vbox(mp,3,4,3,3,4,4);mp.push([3,5,3]);
 vbox(mp,6,7,3,3,4,4);mp.push([7,5,3]);
 const srt=a=>a.sort((p,q)=>(p[1]-q[1])||(p[2]-q[2])||(p[0]-q[0]));
 const uniq=a=>{const s=new Set();return a.filter(v=>{const k=v.join(',');if(s.has(k))return false;s.add(k);return true;});};
 return [pyr,sx,ob,uniq(srt(sh)),uniq(srt(pa)),uniq(srt(lh)),uniq(srt(aq)),uniq(srt(co)),
  uniq(srt(gw)),uniq(srt(pg)),uniq(srt(aw)),uniq(srt(ci)),uniq(srt(tm)),
  uniq(srt(zg)),uniq(srt(tj)),uniq(srt(mo)),uniq(srt(mp))];
}
const VX=buildVoxels();
const MONS=[
 {n:'The Great Pyramid',v:VX[0],d:"Built about 4,500 years ago at Giza in Egypt as a tomb for the pharaoh Khufu. It took more than 2 million stone blocks, and it stood as the tallest building on Earth for almost 4,000 years."},

S.monBlocks=Math.min(S.monBlocks,MONS[S.mon].v.length);
let PA=null,monMode='home',R3=null,monAnim=null;
function showMon(mode){
 monMode=mode;
 const data=PA||{mi:S.mon,prev:S.monBlocks,placed:S.monBlocks,completed:false};
 PA=null;
 const M=MONS[data.mi],total=M.v.length;
 $('mon-name').textContent=M.n+(S.gild>0?' ✨':'');
 $('mon-count').textContent=Math.min(data.placed,total)+' / '+total+' \u{1F9F1}';
 const nb=data.placed-data.prev;
 for(let i=0;i<nb;i++)tone(150+i*20,0.09,'square',0.12,0.15*i+0.15);
 const bn=$('mon-banner');
 if(data.completed){
  bn.className='mon-banner';
  bn.innerHTML='⭐ '+M.n+' is complete!'+(data.mi===MONS.length-1?' A golden age begins…':' Next: '+MONS[S.mon].n)+'<br><span style="font-weight:400;font-size:13px">'+M.d+'</span>';
  setTimeout(snd.rank,nb*150+300);
 }else if(mode==='museum'&&(S.gild>0||data.mi<S.mon)){
  bn.className='mon-banner';
  bn.innerHTML='<span style="font-weight:400;font-size:13px">'+M.d+'</span>';
 }else bn.className='hidden';
 $('btn-mon-go').textContent=mode==='play'?'Next order':'Back';
 show('mon');
 render3D(M,data);
}
function render3D(M,data){
 const host=$('mon-grid');
 if(!window.THREE){host.innerHTML='<p class="note">The 3D build site needs one visit with internet first.</p>';return;}
 if(!R3){
  const w=Math.max(280,Math.min((window.innerWidth||412)-32,440)),hpx=Math.round(w*0.85);
  const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
  renderer.setSize(w,hpx);
  renderer.domElement.style.cssText='margin:0 auto;border-radius:12px;touch-action:none;cursor:grab';
  R3={renderer,aspect:w/hpx};
 }
 host.innerHTML='';host.appendChild(R3.renderer.domElement);
 const scene=new THREE.Scene();
 scene.add(new THREE.AmbientLight(0xffffff,0.65));
 const dl=new THREE.DirectionalLight(0xfff2d0,0.8);dl.position.set(10,20,8);scene.add(dl);
 const group=new THREE.Group();scene.add(group);
 const geo=new THREE.BoxGeometry(0.95,0.95,0.95);
 const matOn=new THREE.MeshLambertMaterial({color:S.gild>0?0xF2C94C:(M.c||0xD8B56A)});
 const matGhost=new THREE.MeshBasicMaterial({color:0xB09A66,transparent:true,opacity:0.15,wireframe:true});
 let mnx=1e9,mxx=-1e9,mny=1e9,mxy=-1e9,mnz=1e9,mxz=-1e9;
 M.v.forEach(v=>{mnx=Math.min(mnx,v[0]);mxx=Math.max(mxx,v[0]);mny=Math.min(mny,v[1]);mxy=Math.max(mxy,v[1]);mnz=Math.min(mnz,v[2]);mxz=Math.max(mxz,v[2]);});
 const cx=(mnx+mxx)/2,cz=(mnz+mxz)/2,cy=(mny+mxy)/2;
 const drops=[];
 M.v.forEach((v,i)=>{
  const on=i<data.placed;
  const mesh=new THREE.Mesh(geo,on?matOn:matGhost);
  mesh.position.set(v[0]-cx,v[1],v[2]-cz);
  if(on&&i>=data.prev){drops.push({mesh,ty:v[1],delay:0.15*(i-data.prev)+0.1});mesh.position.y=v[1]+9;}
  group.add(mesh);
 });
 const span=Math.max(mxx-mnx,mxz-mnz,(mxy-mny)*1.6)+1;
 const cam=new THREE.PerspectiveCamera(40,R3.aspect,0.1,400);
 let dist=1;
 function updateCam(){cam.position.set(span*1.25*dist,cy+span*0.95*dist,span*1.25*dist);cam.lookAt(0,cy,0);}
 updateCam();
 const el=R3.renderer.domElement;
 const pts=new Map();
 const reset=()=>{dist=1;group.position.set(0,0,0);group.rotation.y=0;};
 let lastTap=0;
 el.onpointerdown=e=>{
  const now=performance.now();
  if(pts.size===0&&now-lastTap<350)reset();
  lastTap=now;
  pts.set(e.pointerId,{x:e.clientX,y:e.clientY});el.setPointerCapture(e.pointerId);el.style.cursor='grabbing';
 };
 el.onpointermove=e=>{
  const p=pts.get(e.pointerId);if(!p)return;
  if(pts.size===1){group.rotation.y+=(e.clientX-p.x)*0.01;}
  else if(pts.size===2){
   const arr=[...pts.values()];
   const other=arr[0]===p?arr[1]:arr[0];
   const d0=Math.hypot(p.x-other.x,p.y-other.y);
   const d1=Math.hypot(e.clientX-other.x,e.clientY-other.y);
   if(d0>4&&d1>4)dist=Math.min(2.5,Math.max(0.45,dist*d0/d1));
   const ps=span/(4*(el.clientWidth||380));
   group.position.x+=(e.clientX-p.x)*ps;
   group.position.y-=(e.clientY-p.y)*ps;
  }
  p.x=e.clientX;p.y=e.clientY;
 };
 el.onpointerup=el.onpointercancel=e=>{pts.delete(e.pointerId);if(pts.size===0)el.style.cursor='grab';};
 el.onwheel=e=>{e.preventDefault();dist=Math.min(2.5,Math.max(0.45,dist*(1+e.deltaY*0.001)));};
 el.ondblclick=reset;
 host.insertAdjacentHTML('beforeend','<button class="tgl" id="btn-center" style="display:block;margin:10px auto 0">&#8982; Center view</button><p class="note" style="margin-top:6px">Drag to spin • pinch or scroll to zoom • two fingers to slide</p>');
 $('btn-center').onclick=()=>{snd.tap();reset();};
 if(monAnim)monAnim.stop=true;
 const A={stop:false};monAnim=A;
 R3.renderer.render(scene,cam);
 const start=performance.now();
 function loop(t){
  if(A.stop)return;
  if(pts.size===0)group.rotation.y+=0.003;
  updateCam();
  const sec=(t-start)/1000;
  drops.forEach(d=>{const p=Math.min(1,Math.max(0,(sec-d.delay)/0.5));const e2=1-Math.pow(1-p,3);d.mesh.position.y=d.ty+9*(1-e2);});
  R3.renderer.render(scene,cam);
  requestAnimationFrame(loop);
 }
 requestAnimationFrame(loop);
}
function monDone(){if(monAnim)monAnim.stop=true;if(monMode==='play')newRound();else if(monMode==='museum'){show('museum');renderMuseum();}else{show('home');renderHome();}}
function renderMuseum(){
 const done=i=>S.gild>0||i<S.mon;
 $('mus-count').textContent=MONS.filter((m,i)=>done(i)).length+' / '+MONS.length+' ⭐';
 $('mus-list').innerHTML=MONS.map((m,i)=>{
  if(done(i))return '<div class="mus" onclick="viewMon('+i+')"><div class="t">⭐ '+m.n+(S.gild>0?' ✨':'')+'</div><div class="w">'+m.d+'</div><div class="w" style="color:#B98A2F">Tap to visit</div></div>';
  if(i===S.mon)return '<div class="mus cur" onclick="viewMon('+i+')"><div class="t">\u{1F9F1} '+m.n+'</div><div class="w">Now building — '+S.monBlocks+' / '+m.v.length+' blocks. Fill orders to place more!</div><div class="bar"><i style="width:'+Math.round(100*S.monBlocks/m.v.length)+'%"></i></div></div>';
  return '<div class="mus lock"><div class="t">\u{1F512} Wonder #'+(i+1)+'</div><div class="w">Keep building to discover this wonder.</div></div>';
 }).join('');
}
function viewMon(i){
 snd.tap();
 const p=(S.gild>0||i<S.mon)?MONS[i].v.length:S.monBlocks;
 PA={mi:i,prev:p,placed:p,completed:false};
 showMon('museum');
}
function toMon(){hideOverlay();showMon('play');}
let G=null,timerInt=null;

function newRound(){
 const r=S.round,t=tierFor(r),boss=r>=10&&r%5===0;
 const R={1:[5,13,3,9],2:[9,19,4,12],3:[13,27,6,15],4:[17,31,8,25]}[t];
 let m=rand(R[0],R[1]);if((m&(m-1))===0)m+=1;if(m>31)m=31;
 let b=rand(R[2],R[3]);if(boss)b+=3;
 G={m,b,t,boss,good:pick(GOODS),who:pick(NAMES),rows:[{p:1,v:b,s:false}],cracks:0,q:null,tally:null,time:boss?90:0,done:false};
 if(t===1){while(G.rows[G.rows.length-1].p*2<=m){const l=G.rows[G.rows.length-1];G.rows.push({p:l.p*2,v:l.v*2,s:false});}}
 clearInterval(timerInt);
 show('game');renderGame();
 if(boss)setOverlay('<div class="ovl"><h2>&#9819; Royal order</h2><p class="sub">The palace demands '+G.m+' '+G.good[2]+' of '+G.b+' '+G.good[0]+' &mdash; and you must fill it before the sun sets.</p><button class="btn" onclick="beginBoss()">Begin</button></div>');
}
function beginBoss(){hideOverlay();timerInt=setInterval(tick,1000);renderTop();}
function tick(){if(!G||G.done)return;G.time--;renderTop();if(G.time<=0){clearInterval(timerInt);failRound();}}
function failRound(){G.done=true;snd.err();setOverlay('<div class="ovl"><h2>&#9728;&#65039; The sun has set</h2><p class="sub">The order slipped away. The palace will give you one more chance.</p><button class="btn" onclick="retryRound()">Try again</button></div>');}
function retryRound(){hideOverlay();newRound();}

function unit(){return G.good[2];}
function canCarve(){return G.t>=2&&!G.done&&!G.tally&&G.rows[G.rows.length-1].p*2<=G.m;}

function renderGame(){renderTop();renderOrder();renderStones();renderQ();renderTracker();}
function renderTop(){
 $('day').textContent='Day '+S.round;
 $('rank').textContent=RANKS[G.t]+(G.boss?' • boss':'');
 $('coins').textContent=S.coins;
 const c=Math.min(3,G.cracks);
 $('cracks').textContent='●'.repeat(c)+'○'.repeat(3-c);
 const tm=$('timer');
 tm.textContent=G.boss&&!G.done?'⏳ '+Math.max(0,G.time):'';
 tm.style.color=G.time<=15?'#A93B2A':'#B98A2F';
}
function renderOrder(){
 $('order-big').textContent=G.m+' × '+G.b+' '+G.good[1];
 $('order-sub').textContent=G.m+' '+unit()+' of '+G.b+' '+G.good[0]+' for '+G.who;
}
function renderStones(){
 $('stones').innerHTML=G.rows.map((r,i)=>'<div class="stone'+(r.s?' sel':'')+'" onclick="tog('+i+')"><span class="p">'+r.p+' '+(r.p===1?unit().replace(/s$/,''):unit())+'</span><span>'+r.v+' '+G.good[0]+'</span></div>').join('');
}
function renderQ(){
 const w=$('qwrap');
 if(G.q){
  let inner='<div class="qcard" id="qcard">'+(G.q.role==='carve'?'<button class="qclose" onclick="cancelQ()" aria-label="Cancel">&#10005;</button>':'')+'<p class="prompt">'+(G.q.role==='tally'?'Add up your stones':'Double the last stone')+'</p><p class="eq">'+G.q.prompt+'</p>';
  if(G.q.type==='mc'){inner+='<div class="choices">'+G.q.opts.map(o=>'<button onclick="ans('+o+')">'+o+'</button>').join('')+'</div>';}
  else{inner+='<p class="entry" id="entry">&nbsp;</p><div class="kp">'+[1,2,3,4,5,6,7,8,9].map(d=>'<button onclick="kpAdd('+d+')">'+d+'</button>').join('')+'<button onclick="kpClr()">&#10005;</button><button onclick="kpAdd(0)">0</button><button onclick="kpOk()">&#10003;</button></div>';}
  inner+='<p class="qmsg" id="qmsg"></p></div>';
  w.innerHTML=inner;
 }else if(canCarve()){
  w.innerHTML='<button class="btn" onclick="carve()">&#9935; Carve a double</button><div style="height:12px"></div>';
 }else{w.innerHTML='';}
 const n=$('note');
 if(G.done||G.q||G.tally){n.textContent='';}
 else if(G.t===1){n.textContent='Tap stones so the '+unit()+' add up to exactly '+G.m+'.';}
 else if(!canCarve()){const nx=G.rows[G.rows.length-1].p*2;n.textContent='Another double would be '+nx+' '+unit()+' — more than '+G.m+'. Gather exactly '+G.m+'.';}
 else{n.textContent='Carve doubles, then tap stones to gather exactly '+G.m+' '+unit()+'.';}
}
function renderTracker(){
 const P=G.rows.reduce((a,r)=>a+(r.s?r.p:0),0);
 const tr=$('tracker');
 tr.className='tracker'+(P===G.m?' ok':P>G.m?' over':'');
 tr.textContent=P>G.m?P+' / '+G.m+' '+unit()+' — too many, drop a stone':'Gathered: '+P+' / '+G.m+' '+unit();
}

function cancelQ(){if(G.q&&G.q.role==='carve'){G.q=null;snd.tap();renderGame();}}
function tog(i){
 if(G.done||G.tally)return;
 if(G.q){const qc=$('qcard');if(qc){qc.classList.remove('shake');void qc.offsetWidth;qc.classList.add('shake');}return;}
 G.rows[i].s=!G.rows[i].s;
 const P=G.rows.reduce((a,r)=>a+(r.s?r.p:0),0);
 snd.sel(P);
 renderStones();renderTracker();renderQ();
 if(P===G.m){if(G.t<4){const V=G.rows.reduce((a,r)=>a+(r.s?r.v:0),0);win(V);}else startTally();}
}

function carve(){
 if(!canCarve())return;
 snd.tap();
 const last=G.rows[G.rows.length-1],c=last.v*2;
 G.q={role:'carve',type:G.t===2?'mc':'kp',prompt:last.v+' + '+last.v+' = ?',answer:c,opts:G.t===2?mcOpts(c):null,entry:''};
 renderQ();
}
function mcOpts(c){
 const s=new Set([c]);
 while(s.size<3){const d=c+pick([-2,2,-4,4,-10,10,20]);if(d>0)s.add(d);}
 return shuffle([...s]);
}
function startTally(){
 const vals=G.rows.filter(r=>r.s).map(r=>r.v);
 if(vals.length===1){win(vals[0]);return;}
 G.tally={vals,acc:vals[0],i:1};
 askTally();
}
function askTally(){
 const T=G.tally;
 G.q={role:'tally',type:'kp',prompt:T.acc+' + '+T.vals[T.i]+' = ?',answer:T.acc+T.vals[T.i],entry:''};
 renderQ();
}
function ans(x){
 if(!G.q)return;
 if(x===G.q.answer){
  if(G.q.role==='carve'){
   const last=G.rows[G.rows.length-1];
   G.rows.push({p:last.p*2,v:x,s:false});
   G.q=null;snd.carve();renderGame();
  }else{
   const T=G.tally;T.acc=x;T.i++;
   if(T.i>=T.vals.length){G.q=null;win(T.acc);}
   else{snd.carve();askTally();}
  }
 }else{
  G.cracks++;snd.err();renderTop();
  const qc=$('qcard');if(qc){qc.classList.remove('shake');void qc.offsetWidth;qc.classList.add('shake');}
  const half=G.q.role==='carve'?G.q.prompt.split(' +')[0]:null;
  $('qmsg').textContent=G.q.role==='carve'?'Not quite — add '+half+' to itself.':'Not quite — check your adding.';
  if(G.q.type==='kp'){G.q.entry='';$('entry').innerHTML='&nbsp;';}
 }
}
function kpAdd(d){if(!G.q||G.q.entry.length>=4)return;snd.tap();G.q.entry+=d;$('entry').textContent=G.q.entry;}
function kpClr(){if(!G.q)return;snd.tap();G.q.entry='';$('entry').innerHTML='&nbsp;';}
function kpOk(){if(!G.q||!G.q.entry)return;ans(parseInt(G.q.entry,10));}

function win(V){
 G.done=true;clearInterval(timerInt);
 const perfect=G.cracks===0;
 const earned=10+G.m+(perfect?15:G.cracks===1?8:G.cracks===2?3:0)+(G.boss?25:0);
 const oldT=tierFor(S.round);
 S.coins+=earned;S.round++;
 const eb=2+(perfect?1:0)+(G.boss?2:0);
 const mi=S.mon,prev=S.monBlocks,total=MONS[mi].v.length;
 if(prev+eb>=total){PA={mi,prev,placed:total,completed:true};S.mon=(mi+1)%MONS.length;if(S.mon===0)S.gild++;S.monBlocks=prev+eb-total;}
 else{PA={mi,prev,placed:prev+eb,completed:false};S.monBlocks=prev+eb;}
 save();
 const newT=tierFor(S.round);
 snd.win();if(newT>oldT)setTimeout(snd.rank,600);
 const vals=G.rows.filter(r=>r.s).map(r=>r.v);
 let html='<div class="ovl"><h2>Order filled</h2>';
 if(vals.length>1)html+='<p class="eq1">'+vals.join(' + ')+' = '+V+'</p>';
 html+='<p class="eq2">'+G.m+' × '+G.b+' = '+V+'</p>';
 html+='<p class="sub">No times tables. Just doubling and adding.</p>';
 html+='<p class="coins">+'+earned+' coins'+(perfect?' • perfect carve':'')+(G.boss?' • royal bonus':'')+'</p>';
 html+='<p class="sub" style="margin-top:4px">\u{1F9F1} +'+eb+' blocks for '+MONS[mi].n+'</p>';
 if(newT>oldT){
  const msg={2:'Now you carve the doubles yourself.',3:'No more choices — carve doubles on the keypad.',4:'Now you do the final adding too. The full secret is yours.'}[newT];
  html+='<div class="rankup">&#11088; Rank up! You are now a <b>'+RANKS[newT]+'</b>.<br>'+msg+'</div>';
 }
 html+='<button class="btn" onclick="toMon()">Place your blocks</button></div>';
 renderTop();setOverlay(html);
}
